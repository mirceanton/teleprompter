{{define "base"}}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teleprompter</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --tp-teal: #009688;
      --tp-teal-dark: #00796b;
    }
    body { background-color: #121212; min-height: 100vh; }
    .text-teal { color: var(--tp-teal) !important; }
    .btn-teal {
      background-color: var(--tp-teal);
      border-color: var(--tp-teal);
      color: #fff;
    }
    .btn-teal:hover, .btn-teal:focus {
      background-color: var(--tp-teal-dark);
      border-color: var(--tp-teal-dark);
      color: #fff;
    }
    .card-hover { transition: border-color 0.2s, transform 0.2s; }
    .card-hover:hover {
      border-color: var(--tp-teal) !important;
      transform: translateY(-3px);
    }
  </style>
</head>
<body>
{{template "content" .}}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{{template "scripts" .}}
</body>
</html>
{{end}}

{{define "scripts"}}{{end}}
