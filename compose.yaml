---
services:
  teleprompter:
    image: ghcr.io/mirceanton/teleprompter:latest
    ports: ["8080:8080"]
    restart: unless-stopped
    environment:
      - PORT=8080
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
